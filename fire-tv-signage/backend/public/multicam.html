<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wyze Multi-Cam</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #0f151d;
      --line: #1f2b39;
      --text: #d7e2ef;
      --muted: #89a0ba;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 19, 28, 0.88);
    }
    .bar h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .grid {
      display: grid;
      gap: 10px;
      padding: 10px;
      grid-template-columns: repeat(var(--cols, 2), minmax(0, 1fr));
      align-content: start;
    }
    .tile {
      position: relative;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      overflow: hidden;
      min-height: 180px;
      aspect-ratio: 16 / 9;
    }
    .tile iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    .label {
      position: absolute;
      left: 8px;
      bottom: 8px;
      z-index: 2;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(5, 10, 16, 0.65);
      border: 1px solid rgba(137, 160, 186, 0.35);
      color: #edf4ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="bar">
    <h1 id="title">Wyze Multi-Cam</h1>
    <span class="meta" id="meta">Loading cameras...</span>
  </div>
  <main class="grid" id="grid"></main>
  <script>
    const params = new URLSearchParams(location.search);
    const cams = String(params.get("cams") || "")
      .split(",")
      .map((value) => value.trim())
      .filter(Boolean);
    const bridge = String(params.get("bridge") || "http://192.168.2.90:1984").replace(/\/$/, "");
    const mode = String(params.get("mode") || "hls,mse,webrtc");
    const cols = Math.max(1, Math.min(4, Number(params.get("cols") || 2) || 2));
    const title = String(params.get("title") || "Wyze Multi-Cam");

    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const grid = document.getElementById("grid");
    titleEl.textContent = title;
    grid.style.setProperty("--cols", String(cols));

    if (!cams.length) {
      metaEl.textContent = "No cameras selected";
    } else {
      metaEl.textContent = `${cams.length} camera${cams.length === 1 ? "" : "s"} • ${mode}`;
      for (const cam of cams) {
        const tile = document.createElement("section");
        tile.className = "tile";
        tile.innerHTML = `
          <iframe
            src="${bridge}/stream.html?src=${encodeURIComponent(cam)}&mode=${encodeURIComponent(mode)}"
            loading="lazy"
            referrerpolicy="no-referrer"
            allow="autoplay; fullscreen">
          </iframe>
          <span class="label">${cam}</span>
        `;
        grid.appendChild(tile);
      }
    }
  </script>
</body>
</html>
