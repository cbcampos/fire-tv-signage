<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #131a2a;
      --panel-alt: #0f1623;
      --line: rgba(148, 163, 184, 0.15);
      --text: #e8edf5;
      --muted: #8494ae;
      --dim: #4a5568;
      --amber: #fbbf24;
      --teal: #2dd4bf;
      --blue: #60a5fa;
      --rose: #fb7185;
      --green: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(45, 212, 191, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%, rgba(96, 165, 250, 0.05) 0%, transparent 50%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    .dashboard {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 68vw 32vw;
    }

    /* ── LEFT: Clock + Calendar ────────────────────────── */
    .left {
      display: grid;
      grid-template-rows: 20vh 1fr;
      padding: 2.5vh 2vw 2.5vh 2.8vw;
      gap: 2vh;
    }

    .top-strip {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
    }

    .date-block {
      font-size: 1.8vw;
      font-weight: 700;
      color: var(--muted);
      padding-left: 0.5vw;
    }

    #clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 5.5vw;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1;
    }

    #ampm {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5vw;
      font-weight: 600;
      color: var(--teal);
      vertical-align: super;
    }

    .weather-block {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1vw;
    }

    .weather-meta { text-align: right; }

    #weather-desc { font-size: 1.2vw; font-weight: 600; color: var(--muted); }
    .weather-sub { font-size: 1vw; color: var(--dim); margin-top: 0.3vh; }
    #weather-icon { font-size: 2.5vw; }
    #temp { font-size: 3vw; font-weight: 800; color: var(--text); }

    /* Calendar panel */
    .calendar-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.5vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 1.2vh 1.5vw 1vh;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .panel-title { font-size: 1.2vw; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .panel-count { font-size: 1.1vw; font-weight: 700; color: var(--teal); }

    .events-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1vh 1vw;
      scrollbar-width: none;
    }
    .events-scroll::-webkit-scrollbar { display: none; }

    .event-item {
      display: grid;
      grid-template-columns: 7vw 1fr;
      gap: 1.5vw;
      align-items: center;
      padding: 1vh 0.8vw;
      border-radius: 0.8vw;
    }
    .event-item:hover { background: rgba(255,255,255,0.03); }

    .event-time { font-size: 1.1vw; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--blue); }
    .event-summary { font-size: 1.5vw; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-cal { font-size: 0.95vw; font-weight: 500; color: var(--dim); margin-top: 0.2vh; }
    .no-events { display: flex; align-items: center; justify-content: center; height: 80%; color: var(--dim); font-size: 1.4vw; }

    /* ── RIGHT: Family + Upcoming + Tonight ─────────────── */
    .right {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: 2.5vh 2.5vw 2.5vh 1.5vw;
      gap: 1.5vh;
    }

    .family-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.5vw;
      padding: 1.5vh 1.5vw;
    }

    .family-title { font-size: 1.1vw; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.5vh; }

    .family-member {
      display: flex;
      align-items: center;
      gap: 1vw;
      margin-bottom: 1.2vh;
    }
    .family-member:last-child { margin-bottom: 0; }

    .member-avatar {
      width: 2.5vw;
      height: 2.5vw;
      border-radius: 50%;
      background: var(--panel-alt);
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2vw;
      font-weight: 800;
      flex-shrink: 0;
    }

    .member-name { font-size: 1.2vw; font-weight: 700; color: var(--text); }
    .member-loc { font-size: 0.95vw; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: var(--green); margin-left: auto; flex-shrink: 0; }
    .status-dot.away { background: var(--amber); }

    /* Upcoming this week */
    .upcoming-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.5vw;
      padding: 1.2vh 1.5vw;
      overflow: hidden;
    }

    .upcoming-title { font-size: 1vw; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1vh; }
    .upcoming-day { font-size: 0.95vw; font-weight: 700; color: var(--blue); font-family: 'JetBrains Mono', monospace; min-width: 5vw; }
    .upcoming-text { font-size: 1.1vw; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Tonight panel */
    .tonight-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.5vw;
      padding: 1.2vh 1vw;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1vw;
    }

    .tonight-item { text-align: center; }
    .tonight-label { font-size: 0.85vw; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 0.8vh; }
    .tonight-value { font-size: 1.1vw; font-weight: 700; color: var(--text); }
    .tonight-value.teal { color: var(--teal); }
    .tonight-value.amber { color: var(--amber); }

    .footer { font-size: 0.85vw; font-weight: 500; color: var(--dim); align-self: end; }
  </style>
</head>
<body>

<main class="dashboard">

  <!-- LEFT: Clock + Calendar -->
  <div class="left">
    <div class="top-strip">
      <div class="date-block" id="date-str">Loading...</div>
      <div class="clock-block">
        <span id="clock">--:--:--</span><span id="ampm">--</span>
      </div>
      <div class="weather-block">
        <div class="weather-meta">
          <div id="weather-desc">--</div>
          <div class="weather-sub">Humidity <span id="humidity">--</span>% · Wind <span id="wind">--</span></div>
        </div>
        <div id="weather-icon">☁️</div>
        <div id="temp">--°</div>
      </div>
    </div>

    <div class="calendar-panel">
      <div class="panel-header">
        <span class="panel-title">Today's Schedule</span>
        <span class="panel-count" id="event-count">0 events</span>
      </div>
      <div class="events-scroll" id="calendar-events">
        <div class="no-events">No events today</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Family + Upcoming + Tonight -->
  <div class="right">

    <div class="family-panel">
      <div class="family-title">Family</div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(96,165,250,0.15);border-color:var(--blue)">C</div>
        <div class="member-info">
          <div class="member-name">Chris</div>
          <div class="member-loc" id="chris-loc">--</div>
        </div>
        <div class="status-dot" id="chris-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(251,113,133,0.15);border-color:var(--rose)">A</div>
        <div class="member-info">
          <div class="member-name">Amanda Claire</div>
          <div class="member-loc" id="amanda-loc">--</div>
        </div>
        <div class="status-dot" id="amanda-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(74,222,128,0.15);border-color:var(--green)">F</div>
        <div class="member-info">
          <div class="member-name">Franklin</div>
          <div class="member-loc" id="franklin-loc">--</div>
        </div>
        <div class="status-dot away" id="franklin-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(251,191,36,0.15);border-color:var(--amber)">M</div>
        <div class="member-info">
          <div class="member-name">Mae</div>
          <div class="member-loc" id="mae-loc">--</div>
        </div>
        <div class="status-dot away" id="mae-status-dot"></div>
      </div>
    </div>

    <div class="upcoming-panel">
      <div class="upcoming-title">This Week</div>
      <div id="upcoming-list">
        <div style="display:flex;gap:1vw;margin-bottom:1vh">
          <div class="upcoming-day">--</div>
          <div class="upcoming-text">No upcoming events</div>
        </div>
      </div>
    </div>

    <div class="tonight-panel">
      <div class="tonight-item">
        <div class="tonight-label">Run Group</div>
        <div class="tonight-value teal" id="run-group-status">--</div>
      </div>
      <div class="tonight-item">
        <div class="tonight-label">Dinner</div>
        <div class="tonight-value amber" id="dinner-text">--</div>
      </div>
      <div class="tonight-item">
        <div class="tonight-label">Family</div>
        <div class="tonight-value" id="family-evening">--</div>
      </div>
    </div>

    <div class="footer">Family Command Center</div>
  </div>
</main>

<script>
  const DATA_SERVER = "http://192.168.2.90:8891";

  function escapeHtml(v) {
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('clock').textContent = `${h12}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('ampm').textContent = ampm;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date-str').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    updateFamilyLocations(now);
  }

  function refreshDashboardData() {
    fetch(`${DATA_SERVER}/data`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        updateCalendar(data.today || []);
        updateWeather(data.weather);
        updateUpcoming(data.week || []);
        updateTonight(data.today || []);
      })
      .catch(err => console.warn("Data fetch failed:", err));
  }

  function updateCalendar(events) {
    const container = document.getElementById('calendar-events');
    const count = document.getElementById('event-count');
    const n = events.length;
    count.textContent = n === 1 ? '1 event' : `${n} events`;
    if (!events || n === 0) {
      container.innerHTML = '<div class="no-events">No events today</div>';
      return;
    }
    container.innerHTML = events.map(ev => `
      <div class="event-item">
        <div class="event-time">${escapeHtml(ev.time || 'All day')}</div>
        <div>
          <div class="event-summary">${escapeHtml(ev.summary || 'Untitled')}</div>
          <div class="event-cal">${escapeHtml(ev.calendar || 'Calendar')}</div>
        </div>
      </div>
    `).join('');
  }

  function updateWeather(w) {
    if (!w) return;
    document.getElementById('temp').textContent = w.temp + '°';
    document.getElementById('weather-desc').textContent = w.condition;
    document.getElementById('humidity').textContent = w.humidity;
    document.getElementById('wind').textContent = w.wind + ' mph ' + (w.windDir || '');
    const cond = (w.condition || '').toLowerCase();
    const iconMap = { sun: '☀️', clear: '☀️', cloud: '☁️', overcast: '☁️', rain: '🌧️', drizzle: '🌦️', thunder: '⛈️', storm: '⛈️', snow: '❄️', fog: '🌫️', mist: '🌫️' };
    const icon = Object.entries(iconMap).find(([k]) => cond.includes(k));
    document.getElementById('weather-icon').textContent = icon ? icon[1] : '☁️';
  }

  function updateFamilyLocations(now) {
    const h = now.getHours(), day = now.getDay();

    const set = (locId, dotId, loc) => {
      const locEl = document.getElementById(locId);
      if (locEl) locEl.textContent = loc;
    };

    // Chris
    set('chris-loc', 'chris-status-dot', (h >= 17 || h < 7) ? 'Home' : 'Working remote');

    // Amanda Claire
    if (h >= 9 && h < 17 && day >= 1 && day <= 5) set('amanda-loc', 'amanda-status-dot', 'Work');
    else if (h >= 17 || h < 9) set('amanda-loc', 'amanda-status-dot', 'Home');
    else set('amanda-loc', 'amanda-status-dot', 'Off');

    // Franklin
    if (day >= 1 && day <= 5 && h >= 8 && h < 15) set('franklin-loc', 'franklin-status-dot', 'School');
    else if (h >= 15 && h < 16) set('franklin-loc', 'franklin-status-dot', 'Dismissal');
    else set('franklin-loc', 'franklin-status-dot', 'Home');

    // Mae
    if (day >= 1 && day <= 5 && h >= 8 && h < 14) set('mae-loc', 'mae-status-dot', 'School');
    else if (h >= 14 && h < 15) set('mae-loc', 'mae-status-dot', 'Dismissal');
    else set('mae-loc', 'mae-status-dot', 'Home');
  }

  function updateUpcoming(events) {
    const container = document.getElementById('upcoming-list');
    if (!events || !events.length) {
      container.innerHTML = '<div style="display:flex;gap:1vw;margin-bottom:1vh"><div class="upcoming-day">--</div><div class="upcoming-text">No upcoming events</div></div>';
      return;
    }
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const today = new Date().toDateString();
    const upcoming = (events.filter(e => e.dayStr && e.dayStr !== today)).slice(0, 4);
    if (!upcoming.length) {
      container.innerHTML = '<div style="display:flex;gap:1vw;margin-bottom:1vh"><div class="upcoming-day">--</div><div class="upcoming-text">Nothing beyond today</div></div>';
      return;
    }
    container.innerHTML = upcoming.map(ev => {
      const when = ev.dayStr ? dayNames[new Date(ev.dayStr).getDay()] : '--';
      return `<div style="display:flex;gap:1vw;margin-bottom:1vh">
        <div class="upcoming-day">${when}${ev.time ? ' '+ev.time : ''}</div>
        <div class="upcoming-text">${escapeHtml(ev.summary || 'Untitled')}</div>
      </div>`;
    }).join('');
  }

  function updateTonight(todayEvents) {
    const evs = todayEvents || [];
    const run = evs.find(e => (e.summary||'').toLowerCase().includes('run'));
    const dinner = evs.find(e => { const s=(e.summary||'').toLowerCase(); return s.includes('dinner')||s.includes('supper')||s.includes('cook'); });
    const family = evs.find(e => { const s=(e.summary||'').toLowerCase(); return s.includes('family')||s.includes('game')||s.includes('movie'); });
    document.getElementById('run-group-status').textContent = run ? (run.time || 'Today') : 'Open';
    document.getElementById('dinner-text').textContent = dinner ? dinner.summary : 'Not set';
    document.getElementById('family-evening').textContent = family ? 'Planned' : 'Free';
  }

  updateClock();
  refreshDashboardData();
  setInterval(updateClock, 1000);
  setInterval(refreshDashboardData, 60000);
</script>
</body>
</html>
