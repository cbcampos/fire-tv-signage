<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>Family Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #131a2a;
      --panel-alt: #0f1623;
      --line: rgba(148, 163, 184, 0.15);
      --text: #e8edf5;
      --muted: #8494ae;
      --dim: #4a5568;
      --amber: #fbbf24;
      --teal: #2dd4bf;
      --blue: #60a5fa;
      --rose: #fb7185;
      --green: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(45, 212, 191, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%, rgba(96, 165, 250, 0.05) 0%, transparent 50%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    .dashboard {
      width: 1920px;
      height: 1080px;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      padding: 0;
    }

    /* ── LEFT ─────────────────────────────────────── */
    .left {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0;
      padding: 36px 28px 36px 36px;
    }

    .top-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 24px;
    }

    .date-block {
      font-size: 28px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .clock-block {
      text-align: center;
    }

    #clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 96px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    #ampm {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      color: var(--teal);
      margin-left: 6px;
      vertical-align: super;
    }

    .weather-block {
      text-align: right;
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
    }

    #temp {
      font-size: 52px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .weather-meta {
      text-align: right;
    }

    #weather-desc {
      font-size: 20px;
      font-weight: 600;
      color: var(--muted);
    }

    .weather-sub {
      font-size: 16px;
      color: var(--dim);
      margin-top: 4px;
    }

    #weather-icon {
      font-size: 40px;
    }

    /* ── CALENDAR ──────────────────────────────────── */
    .calendar-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .panel-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--teal);
    }

    .events-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 16px;
      scrollbar-width: none;
    }

    .events-scroll::-webkit-scrollbar { display: none; }

    .event-item {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 16px;
      align-items: center;
      padding: 14px 12px;
      border-radius: 12px;
      margin-bottom: 4px;
      transition: background 0.15s;
    }

    .event-item:hover { background: rgba(255,255,255,0.03); }

    .event-time {
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--blue);
    }

    .event-body { min-width: 0; }

    .event-summary {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-cal {
      font-size: 15px;
      font-weight: 500;
      color: var(--dim);
      margin-top: 2px;
    }

    .no-events {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      color: var(--dim);
      font-size: 22px;
      font-weight: 500;
    }

    /* ── RIGHT ─────────────────────────────────────── */
    .right {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 16px;
      padding: 36px 36px 36px 20px;
    }

    /* Family panel */
    .family-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
    }

    .family-title {
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .family-member {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .family-member:last-child { margin-bottom: 0; }

    .member-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel-alt);
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      flex-shrink: 0;
    }

    .member-info { min-width: 0; }

    .member-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .member-loc {
      font-size: 15px;
      color: var(--dim);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      flex-shrink: 0;
    }

    .status-dot.away { background: var(--amber); }
    .status-dot.offline { background: var(--dim); }

    /* Upcoming this week */
    .upcoming-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 20px;
      overflow: hidden;
    }

    .upcoming-title {
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .upcoming-list { overflow: hidden; }

    .upcoming-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .upcoming-item:last-child { margin-bottom: 0; }

    .upcoming-day {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      min-width: 70px;
      font-family: 'JetBrains Mono', monospace;
    }

    .upcoming-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Tonight panel */
    .tonight-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      overflow: hidden;
    }

    .tonight-item { text-align: center; }

    .tonight-label {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .tonight-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .tonight-value.teal { color: var(--teal); }
    .tonight-value.amber { color: var(--amber); }

    /* Footer */
    .footer {
      font-size: 14px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<main class="dashboard">

  <!-- LEFT: Clock + Calendar -->
  <div class="left">
    <div class="top-strip">
      <div class="date-block" id="date-str">Loading...</div>
      <div class="clock-block">
        <span id="clock">--:--:--</span><span id="ampm">--</span>
      </div>
      <div class="weather-block">
        <div class="weather-meta">
          <div id="weather-desc" class="weather-meta">--</div>
          <div class="weather-sub">Humidity <span id="humidity">--</span>% · Wind <span id="wind">--</span></div>
        </div>
        <div id="weather-icon" style="font-size:36px">🌤</div>
        <div id="temp" style="font-size:52px;font-weight:800">--°</div>
      </div>
    </div>

    <div class="calendar-panel">
      <div class="panel-header">
        <span class="panel-title">Today's Schedule</span>
        <span class="panel-count" id="event-count">0 events</span>
      </div>
      <div class="events-scroll" id="calendar-events">
        <div class="no-events">No events today</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Family + Upcoming + Tonight -->
  <div class="right">

    <!-- Family Locations -->
    <div class="family-panel">
      <div class="family-title">Family</div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(96,165,250,0.15);border-color:var(--blue)">C</div>
        <div class="member-info">
          <div class="member-name">Chris</div>
          <div class="member-loc" id="chris-loc">--</div>
        </div>
        <div class="status-dot" id="chris-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(251,113,133,0.15);border-color:var(--rose)">A</div>
        <div class="member-info">
          <div class="member-name">Amanda Claire</div>
          <div class="member-loc" id="amanda-loc">--</div>
        </div>
        <div class="status-dot" id="amanda-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(74,222,128,0.15);border-color:var(--green)">F</div>
        <div class="member-info">
          <div class="member-name">Franklin</div>
          <div class="member-loc" id="franklin-loc">--</div>
        </div>
        <div class="status-dot away" id="franklin-status-dot"></div>
      </div>

      <div class="family-member">
        <div class="member-avatar" style="background:rgba(251,191,36,0.15);border-color:var(--amber)">M</div>
        <div class="member-info">
          <div class="member-name">Mae</div>
          <div class="member-loc" id="mae-loc">--</div>
        </div>
        <div class="status-dot away" id="mae-status-dot"></div>
      </div>
    </div>

    <!-- Upcoming This Week -->
    <div class="upcoming-panel">
      <div class="upcoming-title">This Week</div>
      <div class="upcoming-list" id="upcoming-list">
        <div class="upcoming-item">
          <div class="upcoming-day">--</div>
          <div class="upcoming-text">No upcoming events</div>
        </div>
      </div>
    </div>

    <!-- Tonight -->
    <div class="tonight-panel">
      <div class="tonight-item">
        <div class="tonight-label">Run Group</div>
        <div class="tonight-value teal" id="run-group-status">--</div>
      </div>
      <div class="tonight-item">
        <div class="tonight-label">Dinner</div>
        <div class="tonight-value amber" id="dinner-text">--</div>
      </div>
      <div class="tonight-item">
        <div class="tonight-label">Family</div>
        <div class="tonight-value" id="family-evening">--</div>
      </div>
    </div>

    <div class="footer">Family Command Center</div>

  </div>
</main>

<script>
  const DATA_SERVER = "http://192.168.2.90:8891";

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('clock').textContent = `${h12}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('ampm').textContent = ampm;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date-str').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

    updateFamilyLocations(now);
  }

  function refreshDashboardData() {
    fetch(`${DATA_SERVER}/data`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        updateCalendar(data.today || []);
        updateWeather(data.weather);
        updateUpcoming(data.week || []);
        updateTonight(data.today || []);
      })
      .catch(err => console.warn("Data fetch failed:", err));
  }

  function updateCalendar(events) {
    const container = document.getElementById('calendar-events');
    const count = document.getElementById('event-count');
    count.textContent = events.length === 1 ? '1 event' : `${events.length} events`;

    if (!events || events.length === 0) {
      container.innerHTML = '<div class="no-events">No events today</div>';
      return;
    }

    container.innerHTML = events.map(ev => `
      <div class="event-item">
        <div class="event-time">${escapeHtml(ev.time || 'All day')}</div>
        <div class="event-body">
          <div class="event-summary">${escapeHtml(ev.summary || 'Untitled')}</div>
          <div class="event-cal">${escapeHtml(ev.calendar || 'Calendar')}</div>
        </div>
      </div>
    `).join('');
  }

  function updateWeather(w) {
    if (!w) return;
    document.getElementById('temp').textContent = w.temp + '°';
    document.getElementById('weather-desc').textContent = w.condition;
    document.getElementById('humidity').textContent = w.humidity;
    document.getElementById('wind').textContent = w.wind + ' mph ' + (w.windDir || '');

    const cond = (w.condition || '').toLowerCase();
    const iconMap = { sun: '☀️', clear: '☀️', cloud: '☁️', overcast: '☁️', rain: '🌧️', drizzle: '🌦️', thunder: '⛈️', storm: '⛈️', snow: '❄️', fog: '🌫️', mist: '🌫️' };
    const icon = Object.entries(iconMap).find(([k]) => cond.includes(k));
    document.getElementById('weather-icon').textContent = icon ? icon[1] : '☁️';
  }

  function updateFamilyLocations(now) {
    const h = now.getHours();
    const day = now.getDay();

    const setMember = (id, locId, dotId, status, loc, isHome) => {
      const locEl = document.getElementById(locId);
      if (locEl) locEl.textContent = loc;
      const dot = document.getElementById(dotId);
      if (dot) {
        dot.className = 'status-dot' + (isHome ? '' : ' away');
      }
    };

    // Chris
    if (h >= 17 || h < 7) {
      setMember('chris', 'chris-loc', 'chris-status-dot', 'Home', '', true);
    } else {
      setMember('chris', 'chris-loc', 'chris-status-dot', 'Working', 'Remote', false);
    }

    // Amanda Claire
    if (h >= 9 && h < 17 && day >= 1 && day <= 5) {
      setMember('amanda', 'amanda-loc', 'amanda-status-dot', 'Work', '9–5', false);
    } else if (h >= 17 || h < 9) {
      setMember('amanda', 'amanda-loc', 'amanda-status-dot', 'Home', '', true);
    } else {
      setMember('amanda', 'amanda-loc', 'amanda-status-dot', 'Off', '', false);
    }

    // Franklin
    if (day >= 1 && day <= 5 && h >= 8 && h < 15) {
      setMember('franklin', 'franklin-loc', 'franklin-status-dot', 'School', 'In transit', false);
    } else if (h >= 15 && h < 16) {
      setMember('franklin', 'franklin-loc', 'franklin-status-dot', 'School', 'Dismissal', false);
    } else {
      setMember('franklin', 'franklin-loc', 'franklin-status-dot', 'Home', '', true);
    }

    // Mae
    if (day >= 1 && day <= 5 && h >= 8 && h < 14) {
      setMember('mae', 'mae-loc', 'mae-status-dot', 'School', 'In transit', false);
    } else if (h >= 14 && h < 15) {
      setMember('mae', 'mae-loc', 'mae-status-dot', 'School', 'Dismissal', false);
    } else {
      setMember('mae', 'mae-loc', 'mae-status-dot', 'Home', '', true);
    }
  }

  function updateUpcoming(events) {
    const container = document.getElementById('upcoming-list');
    if (!events || events.length === 0) {
      container.innerHTML = '<div class="upcoming-item"><div class="upcoming-day">--</div><div class="upcoming-text">No upcoming events</div></div>';
      return;
    }

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const today = new Date().toDateString();
    const upcoming = events.filter(e => e.dayStr && e.dayStr !== today).slice(0, 5);

    if (!upcoming.length) {
      container.innerHTML = '<div class="upcoming-item"><div class="upcoming-day">--</div><div class="upcoming-text">Nothing beyond today</div></div>';
      return;
    }

    container.innerHTML = upcoming.map(ev => {
      const when = ev.dayStr ? dayNames[new Date(ev.dayStr).getDay()] : '--';
      const time = ev.time ? ` ${ev.time}` : '';
      return `<div class="upcoming-item">
        <div class="upcoming-day">${when}${time}</div>
        <div class="upcoming-text">${escapeHtml(ev.summary || 'Untitled')}</div>
      </div>`;
    }).join('');
  }

  function updateTonight(todayEvents) {
    const events = todayEvents || [];
    const runEvent = events.find(e => (e.summary || '').toLowerCase().includes('run'));
    const dinnerEvent = events.find(e => {
      const s = (e.summary || '').toLowerCase();
      return s.includes('dinner') || s.includes('supper') || s.includes('meal') || s.includes('cook');
    });
    const familyEvent = events.find(e => {
      const s = (e.summary || '').toLowerCase();
      return s.includes('family') || s.includes('game') || s.includes('movie');
    });

    document.getElementById('run-group-status').textContent = runEvent ? (runEvent.time || 'Today') : 'Open';
    document.getElementById('dinner-text').textContent = dinnerEvent
      ? `${dinnerEvent.summary}${dinnerEvent.time ? ' ' + dinnerEvent.time : ''}`
      : 'Not set';
    document.getElementById('family-evening').textContent = familyEvent ? 'Planned' : 'Free';
  }

  // ── Boot ──────────────────────────────────────────
  updateClock();
  refreshDashboardData();
  setInterval(updateClock, 1000);
  setInterval(refreshDashboardData, 60000);
</script>
</body>
</html>
